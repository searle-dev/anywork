# Worker Pod template — for reference only.
#
# In production the K8sDriver creates worker Pods dynamically via the
# Kubernetes API.  This file shows the canonical shape of a worker Pod
# so you can audit it, test it manually, or customise the driver template.
#
# Key points:
#   - restartPolicy: Never  (per-session; no restart on failure)
#   - Skills and MCP config are injected via the /prepare endpoint
#   - Worker runs Claude Agent SDK (ClaudeSDKClient)
#   - Workspace is mounted as emptyDir (ephemeral) or a user PVC
#   - All ANTHROPIC_* vars are injected by the server's collectLlmEnv()

---
apiVersion: v1
kind: Pod
metadata:
  name: worker-example          # K8sDriver uses: w-s-<sessionId>
  namespace: anywork
  labels:
    app: anywork-worker
    anywork/pod-name: worker-example
    anywork/session-id: sess-abc123
  annotations:
    anywork/created-at: "2026-01-01T00:00:00Z"
    anywork/skills: "code-review,docker-expert"
spec:
  restartPolicy: Never
  containers:
    - name: worker
      image: anywork-worker:latest
      imagePullPolicy: Never    # k3d import; change to IfNotPresent for registry
      ports:
        - containerPort: 8080
          name: http
      env:
        - name: WORKSPACE_DIR
          value: /workspace
        # ANTHROPIC_* vars are injected dynamically by K8sDriver from config.llmEnv.
        # Below are examples for manual testing / reference:
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: anywork-secrets
              key: ANTHROPIC_API_KEY
              optional: true
        - name: ANTHROPIC_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: anywork-secrets
              key: ANTHROPIC_AUTH_TOKEN
              optional: true
        - name: ANTHROPIC_BASE_URL
          valueFrom:
            secretKeyRef:
              name: anywork-secrets
              key: ANTHROPIC_BASE_URL
              optional: true
        - name: ANTHROPIC_MODEL
          valueFrom:
            secretKeyRef:
              name: anywork-secrets
              key: ANTHROPIC_MODEL
              optional: true
        - name: ANTHROPIC_DEFAULT_SONNET_MODEL
          valueFrom:
            secretKeyRef:
              name: anywork-secrets
              key: ANTHROPIC_DEFAULT_SONNET_MODEL
              optional: true
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 3
        periodSeconds: 3
        failureThreshold: 20
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 10
        periodSeconds: 15
      resources:
        requests:
          cpu: "250m"
          memory: "512Mi"
        limits:
          cpu: "2000m"
          memory: "2Gi"
      volumeMounts:
        - name: workspace
          mountPath: /workspace
  volumes:
    - name: workspace
      emptyDir: {}
      # For persistent user workspace, replace emptyDir with:
      # persistentVolumeClaim:
      #   claimName: workspace-sess-abc123

---
# Companion ClusterIP Service for stable in-cluster DNS routing
# Service name == Pod name; K8sDriver always creates both together.
apiVersion: v1
kind: Service
metadata:
  name: worker-example
  namespace: anywork
  labels:
    app: anywork-worker
spec:
  selector:
    anywork/pod-name: worker-example
  ports:
    - port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
